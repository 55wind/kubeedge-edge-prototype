apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: edge-auth
data:
  rabbitmq.conf: |
    listeners.tcp = none
    listeners.ssl.default = 5671
    ssl_options.cacertfile = /etc/rabbitmq/certs/ca.crt
    ssl_options.certfile   = /etc/rabbitmq/certs/server.crt
    ssl_options.keyfile    = /etc/rabbitmq/certs/server.key
    ssl_options.verify     = verify_peer
    ssl_options.fail_if_no_peer_cert = true
    management.listener.port = 15672
    management.load_definitions = /etc/rabbitmq/definitions.json
    loopback_users.guest = false
  definitions.json: |
    {
      "users": [
        {"name": "isl", "password": "wjdqhqhghdusrntlf1!", "tags": "administrator"}
      ],
      "vhosts": [{"name": "/"}],
      "permissions": [
        {
          "user": "isl",
          "vhost": "/",
          "configure": "^agent\\.metadata$",
          "write": "^(amq\\.default|agent\\.metadata)$",
          "read": "^agent\\.metadata$"
        }
      ],
      "queues": [
        {"name": "agent.metadata", "vhost": "/", "durable": true, "auto_delete": false, "arguments": {}}
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: edge-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5671
            - containerPort: 15672
          volumeMounts:
            - name: config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
            - name: config
              mountPath: /etc/rabbitmq/definitions.json
              subPath: definitions.json
            - name: rabbitmq-certs
              mountPath: /etc/rabbitmq/certs
              readOnly: true
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: rabbitmq-config
        - name: rabbitmq-certs
          secret:
            secretName: rabbitmq-certs
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: edge-auth
spec:
  type: NodePort
  selector:
    app: rabbitmq
  ports:
    - name: amqps
      port: 5671
      targetPort: 5671
      nodePort: 30671
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 30672
